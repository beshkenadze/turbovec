name: Node CI

on:
  push:
    branches: [main]
    paths:
      - "turbovec-node/**"
      - "turbovec/**"
      - ".cargo/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/node-ci.yml"
  pull_request:
    paths:
      - "turbovec-node/**"
      - "turbovec/**"
      - ".cargo/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/node-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: node-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.host }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: macos-14
            target: aarch64-apple-darwin
            smoke: true
          # Cross-compiled from the arm64 runner via the universal macOS SDK
          # (Accelerate is a system framework available for both arches). The
          # arm host cannot execute an x86_64 binary, so no native smoke test —
          # a successful build + artifact is the verification here.
          - host: macos-14
            target: x86_64-apple-darwin
            smoke: false
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            smoke: true
            openblas_target: HASWELL
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            smoke: true
            openblas_target: ARMV8
    defaults:
      run:
        working-directory: turbovec-node
    steps:
      - uses: actions/checkout@v4

      # The Node addon builds OpenBLAS from source and links it statically on
      # Linux (openblas-static feature), which needs a C/Fortran toolchain.
      # macOS uses the Accelerate framework and needs nothing installed.
      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential gfortran

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: turbovec-node/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install npm dependencies
        run: npm install --no-audit --no-fund

      - name: Build native addon (--target ${{ matrix.target }})
        env:
          # Pin OpenBLAS's source build to a portable baseline ISA so it doesn't
          # bake in the CI runner's CPU (e.g. AVX-512/SKYLAKEX) and then SIGILL on
          # older-but-supported CPUs. HASWELL = AVX2/FMA (the crate's x86-64-v3
          # floor); ARMV8 = generic arm64. Empty on macOS (Accelerate, no openblas-src).
          OPENBLAS_TARGET: ${{ matrix.openblas_target }}
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - name: Verify static OpenBLAS (Linux)
        if: runner.os == 'Linux'
        run: |
          f=$(ls turbovec.*.node)
          echo "ldd $f:"
          ldd "$f" || true
          if ldd "$f" | grep -qi openblas; then
            echo "ERROR: libopenblas is still dynamically linked into $f"; exit 1
          fi
          echo "OK: no dynamic libopenblas in $f"

      - name: Smoke test (native round-trip)
        if: ${{ matrix.smoke }}
        run: npm test

      - name: Upload binding artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: turbovec-node/*.node
          if-no-files-found: error

  bun:
    name: Bun smoke - ${{ matrix.target }}
    needs: build
    runs-on: ${{ matrix.host }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: macos-14
            target: aarch64-apple-darwin
    defaults:
      run:
        working-directory: turbovec-node
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenBLAS runtime (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgfortran5 libquadmath0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Download binding artifact
        uses: actions/download-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: turbovec-node

      - name: Smoke test (Bun)
        run: bun examples/smoke.mjs
