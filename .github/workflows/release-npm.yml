name: Release (npm)

on:
  push:
    tags:
      - "node-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.host }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: macos-14
            target: aarch64-apple-darwin
            smoke: true
          - host: macos-14
            target: x86_64-apple-darwin
            smoke: false
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            smoke: true
            openblas_target: HASWELL
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            smoke: true
            openblas_target: ARMV8
    defaults:
      run:
        working-directory: turbovec-node
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential gfortran

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: turbovec-node/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install npm dependencies
        run: npm install --no-audit --no-fund

      - name: Build native addon (--target ${{ matrix.target }})
        env:
          OPENBLAS_TARGET: ${{ matrix.openblas_target }}
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - name: Verify static OpenBLAS (Linux)
        if: runner.os == 'Linux'
        run: |
          f=$(ls turbovec.*.node)
          if ldd "$f" | grep -qi openblas; then
            echo "ERROR: libopenblas is still dynamically linked into $f"; exit 1
          fi
          echo "OK: no dynamic libopenblas in $f"

      - name: Smoke test (native round-trip)
        if: ${{ matrix.smoke }}
        run: npm test

      - name: Upload binding artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: turbovec-node/*.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    if: startsWith(github.ref, 'refs/tags/node-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: turbovec-node
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: turbovec-node/package-lock.json

      - name: Install npm dependencies
        run: npm install --no-audit --no-fund

      - name: Create per-platform npm dirs
        run: npm run create-npm-dirs

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: turbovec-node/artifacts

      - name: Move artifacts into npm dirs
        run: npm run artifacts

      - name: List npm dirs
        run: ls -R npm

      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
          npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
